<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Roast AI Detector</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --accent-muted: #93c5fd;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border: rgba(148, 163, 184, 0.18);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.25);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.35);
      --radius-md: 16px;
      --radius-lg: 24px;
      --transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 4rem 1.5rem 6rem;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 1150px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 3.5rem 3rem;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle at 30% 20%, rgba(96,165,250,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    h1 {
      font-size: clamp(2.5rem, 5.5vw, 4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1.1;
    }

    .intro {
      font-size: 1.18rem;
      color: var(--text-secondary);
      max-width: 70ch;
      opacity: 0.95;
    }

    .upload-section {
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      width: 100%;
    }

    .drop-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 4rem 2.5rem;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(30, 41, 59, 0.4);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .drop-area:hover,
    .drop-area:focus-within {
      border-color: var(--accent);
      background: rgba(96, 165, 250, 0.08);
      box-shadow: var(--shadow-sm);
      transform: translateY(-2px);
    }

    .drop-area p {
      font-size: 1.25rem;
      color: var(--text-secondary);
    }

    .drop-area p:first-child {
      font-weight: 600;
      color: var(--text-primary);
    }

    .preview {
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      background: #0002;
      max-width: 420px;
      transition: var(--transition);
      align-self: flex-start;
    }

    .preview:hover {
      transform: scale(1.015);
      box-shadow: var(--shadow-md);
    }

    .preview img {
      width: 100%;
      height: auto;
      display: block;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border: none;
      padding: 1.1rem 2.8rem;
      border-radius: 14px;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(96,165,250,0.35);
      background: linear-gradient(135deg, var(--accent-hover), var(--accent));
    }

    button:active {
      transform: translateY(-1px);
    }

    .loader {
      display: none;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.2rem;
      width: 100%;
    }

    .spinner-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(96,165,250,0.15);
      border-top: 5px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.1s cubic-bezier(0.55, 0.055, 0.675, 0.19) infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loader p {
      font-size: 1.15rem;
      color: var(--text-secondary);
    }

    /* Hasil analisis – compact, rapi, terstruktur */
    .result {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(260px, 380px);
      gap: 2rem;
      padding: 1.8rem;
      background: rgba(30, 41, 59, 0.45);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow-sm);
      align-items: start;
    }

    .result h2 {
      grid-column: 1 / -1;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--accent-muted);
      margin-bottom: 0.8rem;
    }

    .result-image {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      max-height: 320px;
      object-fit: cover;
      width: 100%;
    }

    .result-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      font-size: 1.1rem;
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.9rem 1.2rem;
      background: rgba(30, 41, 59, 0.35);
      border-radius: 10px;
      border: 1px solid rgba(96,165,250,0.12);
    }

    .result-item b {
      color: var(--accent);
      font-weight: 600;
      font-size: 1.05rem;
    }

    .result-item span {
      color: var(--text-primary);
      font-weight: 500;
    }

    @media (max-width: 900px) {
      .result {
        grid-template-columns: 1fr;
        gap: 1.8rem;
      }
      .result-image {
        max-height: 280px;
      }
    }

    @media (max-width: 640px) {
      body { padding: 2.5rem 1rem 4rem; }
      .container { padding: 2.5rem 2rem; }
      h1 { font-size: 2.6rem; }
      .drop-area { padding: 3rem 2rem; }
      .actions { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .result { padding: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <h1>Coffee Roast</h1>
    <p class="intro">Unggah foto biji kopi — Program akan mendeteksi otomatis.</p>
  </header>

  <form method="POST" enctype="multipart/form-data" id="uploadForm" class="upload-section">
    <div class="drop-area" id="drop-area" tabindex="0">
      <p>Drag & drop gambar di sini</p>
      <p>atau klik untuk memilih file (JPG, PNG, WEBP)</p>
      <input type="file" name="image" id="fileInput" hidden required accept="image/*">
    </div>

    <div class="preview" id="preview"></div>

    <div class="actions">
      <button type="submit">Analisis Sekarang</button>
    </div>
  </form>

  <div class="loader" id="loader">
    <div class="spinner-container">
      <div class="spinner"></div>
      <p>Menganalisis warna, tekstur, dan tingkat karamelisasi...</p>
    </div>
  </div>

  {% if img_path %}
  <div class="result">
    <h2>Hasil Analisis</h2>
    <img class="result-image" src="{{ img_path }}" alt="Biji kopi yang diunggah">
    <div class="result-details">
      <div class="result-item">
        <b>Roast Level</b>
        <span>{{ label }}</span>
      </div>
      <div class="result-item">
        <b>Confidence</b>
        <span>{{ conf }}%</span>
      </div>
    </div>
  </div>
  {% endif %}
</div>

<script>
  const dropArea = document.getElementById("drop-area");
  const fileInput = document.getElementById("fileInput");
  const preview = document.getElementById("preview");
  const form = document.getElementById("uploadForm");
  const loader = document.getElementById("loader");

  dropArea.onclick = () => fileInput.click();

  function showPreview(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      preview.innerHTML = `<img src="${e.target.result}" alt="Preview biji kopi">`;
    };
    reader.readAsDataURL(file);
  }

  fileInput.addEventListener("change", () => showPreview(fileInput.files[0]));

  ["dragover", "dragenter"].forEach(ev => {
    dropArea.addEventListener(ev, e => {
      e.preventDefault();
      dropArea.style.borderColor = "var(--accent)";
    });
  });

  ["dragleave", "drop"].forEach(ev => {
    dropArea.addEventListener(ev, e => {
      e.preventDefault();
      dropArea.style.borderColor = "var(--border)";
    });
  });

  dropArea.addEventListener("drop", e => {
    fileInput.files = e.dataTransfer.files;
    showPreview(e.dataTransfer.files[0]);
  });

  form.addEventListener("submit", () => {
    loader.style.display = "flex";
  });
</script>

</body>
</html>
